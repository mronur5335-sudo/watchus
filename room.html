<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W4TCH US · Oda</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0c12; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; color: #ddd; overflow: hidden; }
        .header { background: #151b25; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #2d3548; }
        .v-container { flex: 1; background: #000; position: relative; }
        video, iframe, #yt { width: 100%; height: 100%; border: none; }
        
        /* SENKRONİZE ET BUTONU (Kritik Parça) */
        #syncOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 100;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .sync-btn { background: #ff4757; color: white; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.2rem; border: none; }

        .chat { flex: 0 0 30%; background: #121722; display: flex; flex-direction: column; border-top: 1px solid #283040; }
        .messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .msg { background: #1f283b; padding: 8px; border-radius: 10px; font-size: 0.9rem; max-width: 80%; }
        .msg.own { align-self: flex-end; background: #2b4b7a; }
        .input-box { padding: 10px; display: flex; gap: 5px; }
        input { flex: 1; background: #1e2638; border: none; padding: 10px; border-radius: 10px; color: #fff; outline: none; }
    </style>
</head>
<body>
    <div id="syncOverlay">
        <button class="sync-btn" id="syncAction">ADMİN BAŞLATTI - SENKRONİZE OL</button>
    </div>

    <div class="header">
        <div>🎬 <b>W4TCH US</b> <span id="cDisp" style="color:#a0b4ff; font-family:monospace; margin-left:10px"></span></div>
        <div id="uDisp">...</div>
    </div>

    <div class="v-container">
        <div id="yt" style="display:none"></div>
        <iframe id="ifr" style="display:none"></iframe>
        <video id="vid" style="display:none" playsinline></video>
    </div>

    <div class="chat">
        <div class="messages" id="msgs"></div>
        <div class="input-box">
            <input type="text" id="mInp" placeholder="Mesaj yazın...">
            <button id="mBtn" style="background:#4f6cdb; color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer">Gönder</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDtl18Hp2i2P_r6Xry_5xuBkp7gaysrlTY", authDomain: "film-7ac05.firebaseapp.com", projectId: "film-7ac05", storageBucket: "film-7ac05.firebasestorage.app", messagingSenderId: "650477853428", appId: "1:650477853428:web:49a179ee55a32dbdb21ca1" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const params = new URLSearchParams(window.location.search);
        const roomCode = params.get('room'), userName = params.get('name');
        let isAdmin = false, ytPlayer, lastStatus = 0;

        document.getElementById('cDisp').textContent = roomCode;

        db.collection('rooms').doc(roomCode).get().then(doc => {
            const d = doc.data();
            isAdmin = (d.admin === userName);
            document.getElementById('uDisp').textContent = (isAdmin ? "👑 " : "👤 ") + userName;

            if(d.type === 'youtube' || d.url.includes('youtu')) {
                document.getElementById('yt').style.display = 'block';
                loadYT(d.url);
            } else if(d.url.match(/\.(mp4|webm|ogg)$/i)) {
                const v = document.getElementById('vid');
                v.style.display = 'block'; v.src = d.url; v.controls = isAdmin;
                setupVid(v);
            } else {
                document.getElementById('ifr').style.display = 'block';
                document.getElementById('ifr').src = d.url;
            }
        });

        // --- ADMIN KONTROLLERİ ---
        function setupVid(v) {
            if(isAdmin) {
                v.onplay = () => db.collection('rooms').doc(roomCode).update({ status: 1, time: v.currentTime });
                v.onpause = () => db.collection('rooms').doc(roomCode).update({ status: 0, time: v.currentTime });
                setInterval(() => { if(!v.paused) db.collection('rooms').doc(roomCode).update({ time: v.currentTime }); }, 3000);
            }
        }

        function loadYT(url) {
            const t = document.createElement('script'); t.src = "https://www.youtube.com/iframe_api";
            document.head.appendChild(t);
            window.onYouTubeIframeAPIReady = () => {
                const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('/').pop();
                ytPlayer = new YT.Player('yt', {
                    videoId: id, playerVars: { controls: isAdmin ? 1 : 0 },
                    events: { onStateChange: (e) => {
                        if(isAdmin) {
                            let s = (e.data == 1) ? 1 : 0;
                            db.collection('rooms').doc(roomCode).update({ status: s, time: ytPlayer.getCurrentTime() });
                        }
                    }}
                });
            };
        }

        // --- SENKRONİZASYON DİNLEYİCİ (1/0 MANTIĞI) ---
        db.collection('rooms').doc(roomCode).onSnapshot(doc => {
            const d = doc.data();
            if(!isAdmin && d) {
                // Admin videoyu başlattıysa ve bizde duruyorsa butonu göster
                if(d.status == 1 && lastStatus == 0) {
                    document.getElementById('syncOverlay').style.display = 'flex';
                }
                if(d.status == 0) {
                    const v = document.getElementById('vid');
                    if(v.src) v.pause();
                    if(ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
                    document.getElementById('syncOverlay').style.display = 'none';
                }
                lastStatus = d.status;
            }
        });

        // SENKRONİZE OL BUTONUNA TIKLANINCA
        document.getElementById('syncAction').onclick = () => {
            db.collection('rooms').doc(roomCode).get().then(doc => {
                const d = doc.data();
                const v = document.getElementById('vid');
                if(v.src) {
                    v.currentTime = d.time;
                    v.play();
                }
                if(ytPlayer && ytPlayer.playVideo) {
                    ytPlayer.seekTo(d.time);
                    ytPlayer.playVideo();
                }
                document.getElementById('syncOverlay').style.display = 'none';
            });
        };

        // --- SOHBET ---
        const mBox = document.getElementById('msgs'), mInp = document.getElementById('mInp');
        document.getElementById('mBtn').onclick = () => {
            if(!mInp.value) return;
            db.collection('rooms').doc(roomCode).collection('messages').add({ s: userName, t: mInp.value, ts: firebase.firestore.FieldValue.serverTimestamp() });
            mInp.value = "";
        };
        db.collection('rooms').doc(roomCode).collection('messages').orderBy('ts').onSnapshot(q => {
            q.docChanges().forEach(c => { if(c.type === 'added') {
                const m = c.doc.data();
                const div = document.createElement('div');
                div.className = `msg ${m.s === userName ? 'own' : ''}`;
                div.innerHTML = `<b>${m.s}:</b> ${m.t}`;
                mBox.appendChild(div); mBox.scrollTop = mBox.scrollHeight;
            }});
        });
    </script>
</body>
</html>
