<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SyncStream · Oda</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0c12;
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #ddd;
        }
        /* üst bilgi */
        .room-header {
            background: #151b25;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2d3548;
            gap: 10px;
        }
        .room-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        .room-code {
            background: #2d3a57;
            padding: 6px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #c0d0ff;
        }
        .copy-btn {
            background: #33415c;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .copy-btn:active { background: #4a5a7a; }
        .user-badge {
            background: #2d4055;
            padding: 8px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        /* iframe alanı */
        .video-wrapper {
            flex: 1 1 60vh;
            background: #000;
            position: relative;
            min-height: 250px;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        /* sohbet bölümü */
        .chat-section {
            flex: 1 1 auto;
            background: #121722;
            display: flex;
            flex-direction: column;
            border-top: 1px solid #283040;
            max-height: 40vh;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            background: #1f283b;
            padding: 10px 14px;
            border-radius: 20px;
            max-width: 85%;
            align-self: flex-start;
            word-wrap: break-word;
            line-height: 1.4;
        }
        .message.own {
            background: #2b4b7a;
            align-self: flex-end;
        }
        .msg-sender {
            font-weight: 600;
            font-size: 0.8rem;
            color: #aec3f0;
            margin-bottom: 4px;
        }
        .msg-text {
            font-size: 0.95rem;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 12px 16px 16px;
            background: #0f1621;
            border-top: 1px solid #263040;
        }
        .chat-input-area input {
            flex: 1;
            background: #1e2638;
            border: none;
            border-radius: 30px;
            padding: 14px 18px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .chat-input-area button {
            background: #4f6cdb;
            border: none;
            border-radius: 30px;
            width: 55px;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
        }
        .chat-input-area button:active { background: #3b56b5; }

        /* mobil düzen */
        @media (max-width: 600px) {
            .room-header { flex-direction: column; align-items: start; }
            .video-wrapper { flex: 1 1 50vh; }
            .chat-section { max-height: 45vh; }
        }
    </style>
</head>
<body>
    <div class="room-header">
        <div class="room-title">
            <span>🎬 SyncStream</span>
            <span class="room-code" id="roomCodeDisplay"></span>
        </div>
        <div style="display: flex; gap: 8px;">
            <button class="copy-btn" id="copyInviteBtn">📋 Davet Linkini Kopyala</button>
            <span class="user-badge" id="userNameDisplay">👤 yükleniyor...</span>
        </div>
    </div>

    <div class="video-wrapper">
        <iframe id="streamFrame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms" allowfullscreen></iframe>
    </div>

    <div class="chat-section">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Mesajınız..." maxlength="200">
            <button id="sendBtn">➤</button>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        // ===== SENİN FIREBASE KONFİGÜRASYONUN =====
        const firebaseConfig = {
            apiKey: "AIzaSyDtl18Hp2i2P_r6Xry_5xuBkp7gaysrlTY",
            authDomain: "film-7ac05.firebaseapp.com",
            projectId: "film-7ac05",
            storageBucket: "film-7ac05.firebasestorage.app",
            messagingSenderId: "650477853428",
            appId: "1:650477853428:web:49a179ee55a32dbdb21ca1",
            measurementId: "G-SBC91W9CDC"
        };
        // =========================================

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // URL'den oda kodu ve kullanıcı adını al
        const urlParams = new URLSearchParams(window.location.search);
        const roomCode = urlParams.get('room');
        const userName = urlParams.get('name') || 'İsimsiz';

        if (!roomCode) {
            alert('Oda kodu eksik! Ana sayfaya yönlendiriliyorsunuz.');
            window.location.href = 'index.html';
        }

        // DOM
        const roomCodeSpan = document.getElementById('roomCodeDisplay');
        const userNameSpan = document.getElementById('userNameDisplay');
        const streamFrame = document.getElementById('streamFrame');
        const chatMessagesDiv = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const copyBtn = document.getElementById('copyInviteBtn');

        roomCodeSpan.textContent = roomCode;
        userNameSpan.textContent = `👤 ${userName}`;

        // Oda bilgisini Firestore'dan al ve iframe'i yükle
        db.collection('rooms').doc(roomCode).get().then(doc => {
            if (doc.exists) {
                const url = doc.data().url;
                streamFrame.src = url;
            } else {
                alert('Oda bulunamadı!');
                window.location.href = 'index.html';
            }
        }).catch(err => {
            console.error('Oda yüklenemedi', err);
        });

        // GERÇEK ZAMANLI SOHBET
        const messagesRef = db.collection('rooms').doc(roomCode).collection('messages').orderBy('timestamp');

        // Yeni mesaj geldikçe listeyi güncelle
        messagesRef.onSnapshot(snapshot => {
            snapshot.docChanges().forEach(change => {
                if (change.type === 'added') {
                    const msg = change.doc.data();
                    displayMessage(msg, change.doc.id);
                }
            });
            // Otomatik kaydır (en alta)
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        });

        // Mesaj gönderme
        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text) return;
            chatInput.value = '';

            try {
                await db.collection('rooms').doc(roomCode).collection('messages').add({
                    sender: userName,
                    text: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            } catch (err) {
                console.error('Mesaj gönderilemedi', err);
                alert('Mesaj gönderilemedi. Tekrar dene.');
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Mesajı ekrana bas (yerel)
        function displayMessage(msg, docId) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message');
            // Gönderen kişi ben miyim?
            if (msg.sender === userName) {
                msgDiv.classList.add('own');
            }
            msgDiv.innerHTML = `<div class="msg-sender">${escapeHtml(msg.sender)}</div>
                                <div class="msg-text">${escapeHtml(msg.text)}</div>`;
            chatMessagesDiv.appendChild(msgDiv);
        }

        // Basit XSS koruması
        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if(m === '&') return '&amp;'; if(m === '<') return '&lt;';
                if(m === '>') return '&gt;'; if(m === '"') return '&quot;';
                return m;
            });
        }

        // Davet linki kopyala
        copyBtn.addEventListener('click', () => {
            const inviteUrl = `${window.location.origin}${window.location.pathname}?room=${roomCode}`;
            navigator.clipboard.writeText(inviteUrl).then(() => {
                copyBtn.textContent = '✅ Kopyalandı!';
                setTimeout(() => { copyBtn.textContent = '📋 Davet Linkini Kopyala'; }, 2000);
            }).catch(() => {
                prompt('Linki manuel kopyala:', inviteUrl);
            });
        });
    </script>
</body>
</html>
