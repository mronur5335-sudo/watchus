<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SyncStream · Oda</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0c12;
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: #ddd;
            overflow: hidden;
        }
        /* üst bilgi */
        .room-header {
            background: #151b25;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2d3548;
            gap: 10px;
            z-index: 100;
        }
        .room-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
        }
        .room-code {
            background: #2d3a57;
            padding: 6px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #c0d0ff;
        }
        .copy-btn {
            background: #33415c;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover { background: #4a5a7a; }
        .copy-btn:active { transform: scale(0.95); }
        
        .users-btn {
            background: #4f6cdb;
            border: none;
            color: white;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .users-btn:hover { background: #3b56b5; }
        .users-btn .count {
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.8rem;
        }
        
        .user-badge {
            background: #2d4055;
            padding: 8px 16px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .host-badge {
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            color: #000;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-left: 8px;
        }
        
        /* Video kontrol paneli */
        .video-controls {
            background: #1a2332;
            padding: 12px 20px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border-bottom: 1px solid #2d3548;
            flex-wrap: wrap;
        }
        .video-controls.active {
            display: flex;
        }
        .control-btn {
            background: #4f6cdb;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .control-btn:hover { background: #3b56b5; transform: translateY(-2px); }
        .control-btn:active { transform: translateY(0); }
        
        .time-display {
            background: #0f131c;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 1rem;
            color: #c0d0ff;
            min-width: 100px;
            text-align: center;
        }
        
        .sync-status {
            color: #9aa4bf;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sync-status.online::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Video alanı */
        .video-wrapper {
            flex: 1;
            background: #000;
            position: relative;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        
        #videoContainer {
            flex: 1;
            position: relative;
            background: #000;
        }
        
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Kilitli iframe overlay (Host dışı için) */
        .iframe-lock {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: 50;
            cursor: not-allowed;
        }
        .iframe-lock::after {
            content: '🔒 Host Kontrolünde';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px 40px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .iframe-lock:hover::after {
            opacity: 1;
        }
        
        /* Google Drive özel kontroller */
        .drive-controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            padding: 15px 25px;
            border-radius: 50px;
            display: none;
            align-items: center;
            gap: 20px;
            z-index: 60;
            border: 1px solid #444;
        }
        .drive-controls.active {
            display: flex;
        }
        .drive-btn {
            background: transparent;
            border: 2px solid #fff;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .drive-btn:hover {
            background: white;
            color: black;
            transform: scale(1.1);
        }
        .drive-progress {
            width: 300px;
            height: 6px;
            background: #444;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }
        .drive-progress-bar {
            height: 100%;
            background: #4f6cdb;
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s;
        }
        .drive-time {
            color: white;
            font-family: monospace;
            font-size: 0.9rem;
            min-width: 100px;
            text-align: center;
        }
        
        /* Sohbet */
        .chat-section {
            height: 35%;
            min-height: 250px;
            background: #121722;
            display: flex;
            flex-direction: column;
            border-top: 1px solid #283040;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            background: #1f283b;
            padding: 10px 14px;
            border-radius: 20px;
            max-width: 85%;
            align-self: flex-start;
            word-wrap: break-word;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.own {
            background: #2b4b7a;
            align-self: flex-end;
        }
        .message.system {
            background: transparent;
            border: 1px dashed #4a5568;
            color: #9aa4bf;
            font-style: italic;
            align-self: center;
            font-size: 0.9rem;
            padding: 8px 16px;
        }
        .message.private {
            background: #4a1f4a;
            border-left: 3px solid #ff6b9d;
        }
        .msg-sender {
            font-weight: 600;
            font-size: 0.8rem;
            color: #aec3f0;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .msg-sender .to {
            color: #ff6b9d;
            font-size: 0.75rem;
        }
        .msg-text {
            font-size: 0.95rem;
        }
        .msg-link-preview {
            margin-top: 8px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            border-left: 3px solid #4f6cdb;
        }
        .msg-link-preview a {
            color: #6d85d9;
            text-decoration: none;
            font-weight: 600;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
            padding: 12px 16px 16px;
            background: #0f1621;
            border-top: 1px solid #263040;
        }
        .chat-input-area input {
            flex: 1;
            background: #1e2638;
            border: none;
            border-radius: 30px;
            padding: 14px 18px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .chat-input-area button {
            background: #4f6cdb;
            border: none;
            border-radius: 30px;
            width: 55px;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .chat-input-area button:hover { background: #3b56b5; }
        
        /* Kullanıcılar Paneli */
        .users-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 400px;
            height: 100vh;
            background: #1a1f2b;
            border-left: 1px solid #2d3548;
            z-index: 1000;
            transition: right 0.3s ease;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 30px rgba(0,0,0,0.5);
        }
        .users-panel.active {
            right: 0;
        }
        .users-panel-header {
            padding: 20px;
            background: #151b25;
            border-bottom: 1px solid #2d3548;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .users-panel-header h3 {
            margin: 0;
            color: #c0d0ff;
        }
        .close-panel {
            background: none;
            border: none;
            color: #9aa4bf;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
        }
        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .user-item {
            background: #252c3b;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s;
            cursor: pointer;
        }
        .user-item:hover {
            background: #2d3648;
            transform: translateX(-5px);
        }
        .user-item.selected {
            background: #2b4b7a;
            border: 2px solid #4f6cdb;
        }
        .user-item.host {
            border-left: 4px solid #ffd700;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-avatar {
            width: 40px;
            height: 40px;
            background: #4f6cdb;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }
        .user-name {
            font-weight: 600;
            color: #eef2fb;
        }
        .user-status {
            font-size: 0.75rem;
            color: #4ade80;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .user-status::before {
            content: '';
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
        }
        .user-actions {
            display: flex;
            gap: 8px;
        }
        .action-btn {
            background: #33415c;
            border: none;
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover { background: #4f6cdb; }
        
        /* Link Önerme Modal */
        .link-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .link-modal.active {
            display: flex;
        }
        .link-modal-content {
            background: #1a1f2b;
            padding: 30px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            border: 1px solid #2d3548;
        }
        .link-modal h3 {
            margin-bottom: 20px;
            color: #c0d0ff;
        }
        .link-input {
            width: 100%;
            background: #0f131c;
            border: 1px solid #2e3648;
            border-radius: 16px;
            padding: 16px;
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
        }
        .link-modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }
        .modal-btn {
            padding: 12px 24px;
            border-radius: 24px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .modal-btn.cancel {
            background: #33415c;
            color: white;
        }
        .modal-btn.send {
            background: #4f6cdb;
            color: white;
        }
        .modal-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        
        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
            display: none;
        }
        .overlay.active {
            display: block;
        }

        @media (max-width: 768px) {
            .room-header { 
                flex-direction: column; 
                align-items: stretch;
                gap: 10px;
            }
            .room-title { justify-content: center; }
            .users-panel { width: 100%; right: -100%; }
            .drive-progress { width: 200px; }
            .chat-section { height: 40%; }
        }
    </style>
</head>
<body>

        <div class="users-list" id="usersList"></div>
