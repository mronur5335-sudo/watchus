<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W4TCH US · Oda</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --amber: #f59e0b;
            --bg: #080a0e;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #000;
            font-family: 'DM Sans', sans-serif;
            height: 100vh;
            overflow: auto;
            color: var(--text);
        }

        .v-container {
            width: 100vw;
            height: 100vh;
            min-height: 300px;
            position: relative;
            background: #000;
        }

        #yt, #ifr, #vid { width: 100%; height: 100%; border: none; }

        /* ─── Top HUD ─────────────────────────────────────── */
        .top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .badge {
            background: rgba(8,10,14,0.75);
            backdrop-filter: blur(16px);
            padding: 7px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 0.82rem;
            color: rgba(255,255,255,0.7);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .badge b {
            color: var(--amber);
            font-weight: 600;
            letter-spacing: 1px;
            font-family: 'Bebas Neue', cursive;
            font-size: 1rem;
        }

        .badge-icon {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e;
            animation: pulse-dot 2s ease infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ─── Queue Bar (üst orta) ────────────────────────── */
        #queueBar {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(8,10,14,0.82);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 6px 10px;
            max-width: calc(100vw - 380px);
            overflow-x: auto;
            scrollbar-width: none;
        }

        #queueBar::-webkit-scrollbar { display: none; }
        #queueBar.empty { display: none; }

        .q-label {
            font-size: 0.68rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            white-space: nowrap;
            padding-right: 8px;
            border-right: 1px solid rgba(255,255,255,0.1);
            margin-right: 2px;
            font-weight: 600;
        }

        .q-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.55);
            white-space: nowrap;
            max-width: 170px;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s;
            position: relative;
            flex-shrink: 0;
        }

        .q-item.active-q {
            background: rgba(245,158,11,0.18);
            border-color: rgba(245,158,11,0.4);
            color: var(--amber);
        }

        .q-num {
            font-family: 'Bebas Neue', cursive;
            font-size: 0.9rem;
            color: var(--muted);
            flex-shrink: 0;
        }

        .q-item.active-q .q-num { color: var(--amber); }

        .q-url {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .q-del {
            opacity: 0;
            cursor: pointer;
            font-size: 10px;
            color: #f87171;
            flex-shrink: 0;
            padding-left: 4px;
            transition: opacity 0.15s;
            line-height: 1;
        }

        .q-item:hover .q-del { opacity: 1; }

        #nextBtn {
            display: none;
            align-items: center;
            gap: 5px;
            background: var(--amber);
            border: none;
            border-radius: 9px;
            padding: 5px 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.78rem;
            font-weight: 700;
            color: #0a0a0a;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        #nextBtn:hover { transform: scale(1.05); box-shadow: 0 4px 14px rgba(245,158,11,0.35); }

        /* ─── Admin Panel ─────────────────────────────────── */
        #adminPanel {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            display: none;
            gap: 8px;
            align-items: center;
        }

        #adminPanel input {
            background: rgba(8,10,14,0.8);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 14px;
            border-radius: 10px;
            color: white;
            width: 220px;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            backdrop-filter: blur(16px);
            transition: border-color 0.2s;
        }

        #adminPanel input:focus { border-color: rgba(245,158,11,0.5); }
        #adminPanel input::placeholder { color: var(--muted); }

        #adminPanel button {
            background: var(--amber);
            border: none;
            padding: 8px 14px;
            border-radius: 10px;
            color: #0a0a0a;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.82rem;
            transition: all 0.2s;
            white-space: nowrap;
        }

        #adminPanel button.secondary {
            background: rgba(255,255,255,0.08);
            color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.12);
        }

        #adminPanel button:hover { transform: scale(1.04); }

        /* ─── Iframe Error ────────────────────────────────── */
        #iframeError {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            border-left: 3px solid #ef4444;
            padding: 24px 32px;
            border-radius: 16px;
            text-align: center;
            display: none;
            z-index: 5;
            max-width: 420px;
            backdrop-filter: blur(10px);
        }

        #iframeError h3 { font-size: 1rem; color: #fca5a5; margin-bottom: 8px; }
        #iframeError p { font-size: 0.85rem; color: rgba(252,165,165,0.7); line-height: 1.5; }

        /* ─── Bottom Buttons ──────────────────────────────── */
        #fsBtn {
            position: fixed;
            bottom: 28px; right: 94px;
            width: 54px; height: 54px;
            background: rgba(8,10,14,0.82);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 100;
            font-size: 20px;
            transition: all 0.25s;
            backdrop-filter: blur(12px);
        }

        #fsBtn:hover { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.4); transform: scale(1.08); }

        #chatToggle {
            position: fixed;
            bottom: 28px; right: 28px;
            width: 54px; height: 54px;
            background: var(--amber);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 28px rgba(245,158,11,0.35);
            z-index: 100;
            font-size: 22px;
            transition: all 0.25s;
        }

        #chatToggle:hover { transform: scale(1.08); box-shadow: 0 12px 36px rgba(245,158,11,0.45); }
        #chatToggle.open { background: rgba(8,10,14,0.9); box-shadow: 0 4px 16px rgba(0,0,0,0.5); }

        /* ─── Unread Badge ────────────────────────────────── */
        #unreadBadge {
            position: absolute;
            top: -6px; right: -6px;
            min-width: 20px; height: 20px;
            background: #ef4444;
            border-radius: 10px;
            font-size: 0.68rem;
            font-weight: 700;
            color: white;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
            box-shadow: 0 2px 8px rgba(239,68,68,0.6);
            pointer-events: none;
            font-family: 'DM Sans', sans-serif;
            border: 2px solid #080a0e;
        }

        @keyframes badgePop {
            0% { transform: scale(0); }
            70% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        /* ─── Chat Window ─────────────────────────────────── */
        .chat-window {
            position: fixed;
            bottom: 94px; right: 28px;
            width: 310px; height: 440px;
            background: rgba(8,10,14,0.92);
            backdrop-filter: blur(24px);
            border-radius: 18px;
            display: none;
            flex-direction: column;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 24px 60px rgba(0,0,0,0.7);
            z-index: 99;
            overflow: hidden;
            transform-origin: bottom right;
        }

        .chat-window.active {
            display: flex;
            animation: chatIn 0.2s ease both;
        }

        @keyframes chatIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        .chat-header {
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            font-size: 0.78rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-header::before {
            content: '';
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e;
        }

        .msgs {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        .msgs::-webkit-scrollbar { width: 4px; }
        .msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        .msg {
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.84rem;
            max-width: 85%;
            word-wrap: break-word;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.06);
            line-height: 1.4;
            color: rgba(255,255,255,0.85);
        }

        .msg b {
            color: var(--amber);
            font-size: 0.75rem;
            display: block;
            margin-bottom: 2px;
            font-weight: 600;
        }

        .msg.own {
            align-self: flex-end;
            background: rgba(245,158,11,0.15);
            border-color: rgba(245,158,11,0.2);
        }

        .msg.own b { color: #fcd34d; }

        .chat-input {
            padding: 12px;
            display: flex;
            gap: 8px;
            border-top: 1px solid rgba(255,255,255,0.07);
        }

        .chat-input input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 9px 13px;
            border-radius: 10px;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input input:focus { border-color: rgba(245,158,11,0.4); }
        .chat-input input::placeholder { color: var(--muted); }

        .chat-input button {
            background: var(--amber);
            border: none;
            width: 36px; height: 36px;
            border-radius: 10px;
            color: #0a0a0a;
            cursor: pointer;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .chat-input button:hover { transform: scale(1.08); }

        /* ─── Responsive ──────────────────────────────────── */
        @media (max-width: 600px) {
            .v-container { height: 56vw; min-height: 220px; }
            body { overflow: hidden; }
            .top-bar { top: 10px; left: 10px; gap: 5px; }
            .badge { padding: 5px 10px; font-size: 0.75rem; }
            #adminPanel { top: 10px; right: 10px; }
            #adminPanel input { width: 130px; }
            .chat-window { width: calc(100vw - 24px); right: 12px; bottom: 88px; }
            #chatToggle, #fsBtn { width: 46px; height: 46px; bottom: 16px; }
            #chatToggle { right: 16px; }
            #fsBtn { right: 72px; }
            #queueBar { max-width: calc(100vw - 20px); top: 60px; left: 10px; transform: none; }
        }
    </style>
</head>
<body>
    <div id="iframeError">
        <h3>🚨 İçerik Yüklenemedi</h3>
        <p>Bu site iframe bağlantısını engelliyor. Lütfen direkt video linki kullanın.</p>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDtl18Hp2i2P_r6Xry_5xuBkp7gaysrlTY", authDomain: "film-7ac05.firebaseapp.com", projectId: "film-7ac05", storageBucket: "film-7ac05.firebasestorage.app", messagingSenderId: "650477853428", appId: "1:650477853428:web:49a179ee55a32dbdb21ca1" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const params = new URLSearchParams(window.location.search);
        const roomCode = params.get('room'), userName = params.get('name') || "Anonim";
        let isAdmin = false, ytPlayer, currentUrl = "";

        document.getElementById('cDisp').textContent = roomCode;

        // ─── Room Listener ────────────────────────────────
        db.collection('rooms').doc(roomCode).onSnapshot(doc => {

            isAdmin = (d.admin === userName);
            document.getElementById('uDisp').textContent = (isAdmin ? "👑 " : "👤 ") + userName;
            if(isAdmin) document.getElementById('adminPanel').style.display = 'flex';

            renderQueue(d.queue || [], d.queueIndex || 0);

            if (currentUrl !== d.url) { currentUrl = d.url; loadPlayer(d); }
            if(!isAdmin) syncClient(d);
        });

        // ─── Queue Render ─────────────────────────────────
        function renderQueue(queue, activeIdx) {
            const bar = document.getElementById('queueBar');
            const nextBtn = document.getElementById('nextBtn');

            // Önceki q-item'ları temizle
            bar.querySelectorAll('.q-item').forEach(el => el.remove());

            if (queue.length === 0) {
                bar.classList.add('empty');
                nextBtn.style.display = 'none';
                return;
            }

            bar.classList.remove('empty');

            queue.forEach((item, i) => {
                const el = document.createElement('div');
                el.className = 'q-item' + (i === activeIdx ? ' active-q' : '');

                const num = document.createElement('span');
                num.className = 'q-num';
                num.textContent = i + 1;

                const urlSpan = document.createElement('span');
                urlSpan.className = 'q-url';
                // Kısa gösterim: domain veya son 24 karakter
                try {
                    const hostname = new URL(item.url).hostname.replace('www.','');
                    urlSpan.textContent = hostname;
                    urlSpan.title = item.url;
                } catch(e) {
                    urlSpan.textContent = item.url.length > 22 ? item.url.slice(0,22)+'…' : item.url;
                }

                el.appendChild(num);
                el.appendChild(urlSpan);

                if(isAdmin) {
                    const del = document.createElement('span');
                    del.className = 'q-del';
                    del.textContent = '✕';
                    del.title = 'Sıradan Kaldır';
                    del.onclick = (e) => { e.stopPropagation(); removeFromQueue(i); };
                    el.appendChild(del);
                }

                bar.insertBefore(el, nextBtn);
            });

            if(isAdmin && queue.length > 1) {
                nextBtn.style.display = 'flex';
            } else {
                nextBtn.style.display = 'none';
            }
        }

                const d = doc.data();
                const queue = d.queue || [];
                queue.push({ url });
