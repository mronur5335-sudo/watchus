<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W4TCH US · Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --amber: #f59e0b;
            --amber-dim: rgba(245, 158, 11, 0.15);
            --bg: #080a0e;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text: #e2e8f0;
            --muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        /* Background film grain & atmosphere */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 0%, rgba(245,158,11,0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 100%, rgba(99,102,241,0.06) 0%, transparent 60%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            opacity: 0.35;
            pointer-events: none;
        }

        /* Film strip decoration */
        .film-strip {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: repeating-linear-gradient(
                90deg,
                var(--amber) 0px, var(--amber) 18px,
                transparent 18px, transparent 28px
            );
            opacity: 0.4;
        }

        .film-strip-bottom {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 6px;
            background: repeating-linear-gradient(
                90deg,
                var(--amber) 0px, var(--amber) 18px,
                transparent 18px, transparent 28px
            );
            opacity: 0.4;
        }

        .wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: fadeUp 0.6s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-mark {
            font-family: 'Bebas Neue', cursive;
            font-size: 3.8rem;
            letter-spacing: 4px;
            color: white;
            line-height: 1;
            position: relative;
            display: inline-block;
        }

        .logo-mark span {
            color: var(--amber);
        }

        .logo-sub {
            font-size: 0.7rem;
            letter-spacing: 6px;
            color: var(--muted);
            text-transform: uppercase;
            margin-top: 6px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px;
            backdrop-filter: blur(20px);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 40px 80px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.06);
        }

        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background: rgba(0,0,0,0.3);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 28px;
            border: 1px solid var(--border);
        }

        .tab {
            padding: 11px;
            text-align: center;
            cursor: pointer;
            border-radius: 9px;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--muted);
            transition: all 0.25s;
            letter-spacing: 0.3px;
        }

        .tab.active {
            background: var(--amber);
            color: #0a0a0a;
            font-weight: 600;
        }

        .field-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 0.72rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 7px;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            background: rgba(0,0,0,0.35);
            border: 1px solid var(--border);
            border-radius: 11px;
            padding: 13px 16px;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
        }

        input::placeholder { color: rgba(100,116,139,0.7); }

        input:focus, select:focus {
            border-color: rgba(245,158,11,0.5);
            box-shadow: 0 0 0 3px rgba(245,158,11,0.08);
        }

        select option { background: #1a1a2e; }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            margin-top: 8px;
            background: var(--amber);
            color: #0a0a0a;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(245,158,11,0.3);
        }

        .btn:active { transform: translateY(0); }

        .warning-box {
            background: rgba(245, 158, 11, 0.08);
            border: 1px solid rgba(245, 158, 11, 0.25);
            border-left: 3px solid var(--amber);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            color: #fbbf24;
            margin-bottom: 14px;
            line-height: 1.5;
        }

        .hidden { display: none; }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 22px 0;
        }
    </style>
</head>
<body>
    <div class="film-strip"></div>
    <div class="film-strip-bottom"></div>

    <div class="wrapper">
        <div class="logo">
            <div class="logo-mark">W<span>4</span>TCH US</div>
            <div class="logo-sub">Birlikte İzle</div>
        </div>

        <div class="card">
            <div class="tabs">
                <div id="tCreate" class="tab active">Oda Kur</div>
                <div id="tJoin" class="tab">Odaya Katıl</div>
            </div>

            <div id="fCreate">
                <div class="field-group">
                    <label>Adınız</label>
                    <input type="text" id="cName" placeholder="Kullanıcı adı girin">
                </div>
                <div class="field-group">
                    <label>İçerik Türü</label>
                    <select id="vType">
                        <option value="youtube">YouTube</option>
                        <option value="drive">Google Drive Video</option>
                        <option value="direct">Direkt Link (.mp4, .m3u8)</option>
                        <option value="iframe">Web Sitesi (Iframe)</option>
                    </select>
                </div>

                <div id="iframeWarning" class="warning-box" style="display:none;">
                    ⚠️ <b>Önemli:</b> Google, Netflix ve Disney+ gibi siteler güvenlik nedeniyle iframe içinde açılmaz. Direkt video linki kullanın.
                </div>

                <div class="field-group">
                    <label>Video Linki</label>
                    <input type="url" id="cUrl" placeholder="Link yapıştırın...">
                </div>
                <button class="btn" id="bCreate">Odayı Başlat →</button>
            </div>

            <div id="fJoin" class="hidden">
                <div class="field-group">
                    <label>Oda Kodu</label>
                    <input type="text" id="jCode" placeholder="Örn: A3X9F2">
                </div>
                <div class="field-group">
                    <label>Adınız</label>
                    <input type="text" id="jName" placeholder="Kullanıcı adı girin">
                </div>
                <button class="btn" id="bJoin">Odaya Katıl →</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDtl18Hp2i2P_r6Xry_5xuBkp7gaysrlTY", authDomain: "film-7ac05.firebaseapp.com", projectId: "film-7ac05", storageBucket: "film-7ac05.firebasestorage.app", messagingSenderId: "650477853428", appId: "1:650477853428:web:49a179ee55a32dbdb21ca1" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('vType').onchange = (e) => {
            document.getElementById('iframeWarning').style.display = (e.target.value === 'iframe') ? 'block' : 'none';
        };

        document.getElementById('tCreate').onclick = () => { fCreate.classList.remove('hidden'); fJoin.classList.add('hidden'); tCreate.classList.add('active'); tJoin.classList.remove('active'); };
        document.getElementById('tJoin').onclick = () => { fJoin.classList.remove('hidden'); fCreate.classList.add('hidden'); tJoin.classList.add('active'); tCreate.classList.remove('active'); };

        document.getElementById('bCreate').onclick = async () => {
            const name = document.getElementById('cName').value, url = document.getElementById('cUrl').value, type = document.getElementById('vType').value;
            if(!name || !url) return alert("Eksik alan!");
            const code = Math.random().toString(36).substring(2,8).toUpperCase();
            await db.collection('rooms').doc(code).set({ url, type, admin: name, status: 0, time: 0 });
            window.location.href = `room.html?room=${code}&name=${encodeURIComponent(name)}`;
        };

        document.getElementById('bJoin').onclick = () => {
            const code = document.getElementById('jCode').value.toUpperCase(), name = document.getElementById('jName').value;
            window.location.href = `room.html?room=${code}&name=${encodeURIComponent(name)}`;
        };
    </script>
</body>
</html>
