<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W4TCH US · Giriş</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b0e14; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .container { background: #1a1f2b; width: 100%; max-width: 450px; border-radius: 25px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); color: #fff; text-align: center; }
        h1 { margin-bottom: 20px; color: #a0b4ff; }
        input, select { width: 100%; background: #0f131c; border: 1px solid #2e3648; border-radius: 12px; padding: 12px; color: #fff; margin-bottom: 15px; outline: none; }
        .btn { background: #4f6cdb; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 10px; background: #252c3b; border-radius: 10px; cursor: pointer; }
        .tab.active { background: #3d4a6b; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 W4TCH US</h1>
        <div class="tabs">
            <div class="tab active" id="tCreate">Oda Kur</div>
            <div class="tab" id="tJoin">Katıl</div>
        </div>
        <div id="fCreate">
            <input type="text" id="cName" placeholder="Adınız">
            <select id="vType">
                <option value="youtube">YouTube</option>
                <option value="google">Direkt Video / Web Sitesi</option>
            </select>
            <input type="url" id="cUrl" placeholder="Link Yapıştırın">
            <button class="btn" id="bCreate">Odayı Başlat</button>
        </div>
        <div id="fJoin" class="hidden">
            <input type="text" id="jCode" placeholder="Oda Kodu">
            <input type="text" id="jName" placeholder="Adınız">
            <button class="btn" id="bJoin">Katıl</button>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDtl18Hp2i2P_r6Xry_5xuBkp7gaysrlTY", authDomain: "film-7ac05.firebaseapp.com", projectId: "film-7ac05", storageBucket: "film-7ac05.firebasestorage.app", messagingSenderId: "650477853428", appId: "1:650477853428:web:49a179ee55a32dbdb21ca1" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        document.getElementById('tCreate').onclick = () => { document.getElementById('fCreate').classList.remove('hidden'); document.getElementById('fJoin').classList.add('hidden'); document.getElementById('tCreate').classList.add('active'); document.getElementById('tJoin').classList.remove('active'); };
        document.getElementById('tJoin').onclick = () => { document.getElementById('fJoin').classList.remove('hidden'); document.getElementById('fCreate').classList.add('hidden'); document.getElementById('tJoin').classList.add('active'); document.getElementById('tCreate').classList.remove('active'); };

        document.getElementById('bCreate').onclick = async () => {
            const name = document.getElementById('cName').value, url = document.getElementById('cUrl').value, type = document.getElementById('vType').value;
            if(!name || !url) return alert("Eksik bilgi!");
            const code = Math.random().toString(36).substring(2,8).toUpperCase();
            await db.collection('rooms').doc(code).set({ url, type, admin: name, status: 0, time: 0 });
            window.location.href = `room.html?room=${code}&name=${encodeURIComponent(name)}`;
        };
        document.getElementById('bJoin').onclick = () => {
            const code = document.getElementById('jCode').value.toUpperCase(), name = document.getElementById('jName').value;
            window.location.href = `room.html?room=${code}&name=${encodeURIComponent(name)}`;
        };
    </script>
</body>
</html>
