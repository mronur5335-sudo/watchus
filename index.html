<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W4TCH US · Giriş</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0b0e14; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
        .container { background: #1a1f2b; width: 100%; max-width: 450px; border-radius: 25px; padding: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); color: #fff; text-align: center; }
        h1 { margin-bottom: 20px; color: #a0b4ff; font-size: 2.5rem; }
        input, select { width: 100%; background: #0f131c; border: 1px solid #2e3648; border-radius: 12px; padding: 14px; color: #fff; margin-bottom: 15px; outline: none; font-size: 1rem; }
        .btn { background: #4f6cdb; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .btn:hover { background: #3d58b5; }
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; background: #0f131c; padding: 5px; border-radius: 15px; }
        .tab { flex: 1; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; color: #a7b3d0; }
        .tab.active { background: #252c3b; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 W4TCH US</h1>
        <div class="tabs">
            <div class="tab active" id="tCreate">Oda Kur</div>
            <div class="tab" id="tJoin">Katıl</div>
        </div>
        
        <div id="fCreate">
            <input type="text" id="cName" placeholder="Adınız">
            <select id="vType">
                <option value="youtube">YouTube</option>
                <option value="google">Web Sitesi / Direkt Video</option>
            </select>
            <input type="url" id="cUrl" placeholder="Video veya Site Linki">
            <button class="btn" id="bCreate">Odayı Oluştur</button>
        </div>

        <div id="fJoin" class="hidden">
            <input type="text" id="jCode" placeholder="Oda Kodu (Örn: ABC123)">
            <input type="text" id="jName" placeholder="Adınız">
            <button class="btn" id="bJoin">Odaya Giriş Yap</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyDtl18Hp2i2P_r6Xry_5xuBkp7gaysrlTY", authDomain: "film-7ac05.firebaseapp.com", projectId: "film-7ac05", storageBucket: "film-7ac05.firebasestorage.app", messagingSenderId: "650477853428", appId: "1:650477853428:web:49a179ee55a32dbdb21ca1" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const tCreate = document.getElementById('tCreate'), tJoin = document.getElementById('tJoin'), fCreate = document.getElementById('fCreate'), fJoin = document.getElementById('fJoin');
        
        tCreate.onclick = () => { fCreate.classList.remove('hidden'); fJoin.classList.add('hidden'); tCreate.classList.add('active'); tJoin.classList.remove('active'); };
        tJoin.onclick = () => { fJoin.classList.remove('hidden'); fCreate.classList.add('hidden'); tJoin.classList.add('active'); tCreate.classList.remove('active'); };

        document.getElementById('bCreate').onclick = async () => {
            const name = document.getElementById('cName').value, url = document.getElementById('cUrl').value, type = document.getElementById('vType').value;
            if(!name || !url) return alert("Lütfen tüm alanları doldurun!");
            const code = Math.random().toString(36).substring(2,8).toUpperCase();
            await db.collection('rooms').doc(code).set({ url, type, admin: name, status: 0, time: 0 });
            window.location.href = `room.html?room=${code}&name=${encodeURIComponent(name)}`;
        };

        document.getElementById('bJoin').onclick = () => {
            const code = document.getElementById('jCode').value.toUpperCase(), name = document.getElementById('jName').value;
            if(!code || !name) return alert("Bilgileri girin!");
            window.location.href = `room.html?room=${code}&name=${encodeURIComponent(name)}`;
        };
    </script>
</body>
</html>
