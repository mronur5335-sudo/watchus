<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>SyncStream · Create / Join</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0b0e14;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            background: #1a1f2b;
            width: 100%;
            max-width: 480px;
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            color: #eef2fb;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #a0b4ff, #c0a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            color: #9aa4bf;
            margin-bottom: 32px;
            font-size: 1rem;
            border-left: 3px solid #3f4b6b;
            padding-left: 16px;
        }
        .tab-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }
        .tab {
            flex: 1;
            background: #252c3b;
            border: none;
            color: #a7b3d0;
            font-weight: 600;
            padding: 14px 0;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }
        .tab.active {
            background: #3d4a6b;
            color: white;
            box-shadow: 0 4px 12px #1e2a44;
        }
        .form {
            display: block;
            transition: opacity 0.2s;
        }
        .form.hidden {
            display: none;
        }
        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin: 20px 0 6px;
            color: #b7c3e0;
        }
        input {
            width: 100%;
            background: #0f131c;
            border: 1px solid #2e3648;
            border-radius: 20px;
            padding: 16px 20px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: border 0.2s;
        }
        input:focus {
            border-color: #6d85d9;
        }
        .btn {
            background: #4f6cdb;
            color: white;
            font-weight: 700;
            border: none;
            width: 100%;
            padding: 18px 0;
            border-radius: 40px;
            font-size: 1.2rem;
            margin-top: 32px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 8px 18px #1d2b55;
        }
        .btn:active { transform: scale(0.97); background: #3b56b5; }
        .hint {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #6b7a9c;
        }
        .error {
            background: #411f2b;
            color: #ffb0b0;
            padding: 12px;
            border-radius: 20px;
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 SyncStream</h1>
        <div class="sub">Birlikte izle, anında sohbet et</div>

        <div class="tab-bar">
            <button class="tab active" id="tabCreate">➕ Oda Kur</button>
            <button class="tab" id="tabJoin">🔑 Odaya Katıl</button>
        </div>

        <!-- CREATE ROOM FORM -->
        <div id="formCreate" class="form">
            <label>👤 Senin ismin</label>
            <input type="text" id="createName" placeholder="ör. sinemasever" maxlength="30">
            <label>🔗 İzleme linki (site adresi)</label>
            <input type="url" id="createUrl" placeholder="https://....">
            <button class="btn" id="createBtn">Odayı Oluştur</button>
        </div>

        <!-- JOIN ROOM FORM -->
        <div id="formJoin" class="form hidden">
            <label>🔐 Oda kodu</label>
            <input type="text" id="joinCode" placeholder="örn. ABC123" maxlength="10">
            <label>👤 Senin ismin</label>
            <input type="text" id="joinName" placeholder="ör. sinemasever">
            <button class="btn" id="joinBtn">Odaya Katıl</button>
        </div>

        <div id="errorMessage" class="error" style="display: none;"></div>
        <div class="hint">⚡ Gerçek zamanlı · arkadaşlarınla izle</div>
    </div>

    <!-- Firebase SDK (8.x compat) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script>
        // ===== SENİN FIREBASE KONFİGÜRASYONUN =====
        const firebaseConfig = {
            apiKey: "AIzaSyDtl18Hp2i2P_r6Xry_5xuBkp7gaysrlTY",
            authDomain: "film-7ac05.firebaseapp.com",
            projectId: "film-7ac05",
            storageBucket: "film-7ac05.firebasestorage.app",
            messagingSenderId: "650477853428",
            appId: "1:650477853428:web:49a179ee55a32dbdb21ca1",
            measurementId: "G-SBC91W9CDC"
        };
        // =========================================

        // Firebase başlat
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // DOM öğeleri
        const tabCreate = document.getElementById('tabCreate');
        const tabJoin = document.getElementById('tabJoin');
        const formCreate = document.getElementById('formCreate');
        const formJoin = document.getElementById('formJoin');
        const errorDiv = document.getElementById('errorMessage');

        const createName = document.getElementById('createName');
        const createUrl = document.getElementById('createUrl');
        const createBtn = document.getElementById('createBtn');
        const joinCode = document.getElementById('joinCode');
        const joinName = document.getElementById('joinName');
        const joinBtn = document.getElementById('joinBtn');

        // Sekme değiştirme
        tabCreate.addEventListener('click', () => {
            tabCreate.classList.add('active');
            tabJoin.classList.remove('active');
            formCreate.classList.remove('hidden');
            formJoin.classList.add('hidden');
            hideError();
        });
        tabJoin.addEventListener('click', () => {
            tabJoin.classList.add('active');
            tabCreate.classList.remove('active');
            formJoin.classList.remove('hidden');
            formCreate.classList.add('hidden');
            hideError();
        });

        function showError(msg) {
            errorDiv.style.display = 'block';
            errorDiv.textContent = msg;
        }
        function hideError() {
            errorDiv.style.display = 'none';
        }

        // Rastgele oda kodu oluştur (6 karakter)
        function generateRoomCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars[Math.floor(Math.random() * chars.length)];
            }
            return code;
        }

        // Oda oluştur
        createBtn.addEventListener('click', async () => {
            const name = createName.value.trim();
            const url = createUrl.value.trim();
            if (!name || !url) {
                showError('İsim ve link zorunlu');
                return;
            }
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                showError('Link http:// veya https:// ile başlamalı');
                return;
            }

            hideError();
            createBtn.disabled = true;
            createBtn.textContent = 'Oluşturuluyor...';

            try {
                let roomCode;
                let exists = true;
                // Benzersiz kod bul
                while (exists) {
                    roomCode = generateRoomCode();
                    const snap = await db.collection('rooms').doc(roomCode).get();
                    exists = snap.exists;
                }

                // Firestore'a oda kaydı
                await db.collection('rooms').doc(roomCode).set({
                    url: url,
                    createdBy: name,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Kullanıcıyı odaya yönlendir (adı ve kodu URL'de taşı)
                window.location.href = `room.html?room=${roomCode}&name=${encodeURIComponent(name)}`;
            } catch (err) {
                showError('Bir hata oluştu: ' + err.message);
                createBtn.disabled = false;
                createBtn.textContent = 'Odayı Oluştur';
            }
        });

        // Odaya katıl
        joinBtn.addEventListener('click', async () => {
            const code = joinCode.value.trim().toUpperCase();
            const name = joinName.value.trim();
            if (!code || !name) {
                showError('Oda kodu ve isim gerekli');
                return;
            }

            hideError();
            joinBtn.disabled = true;
            joinBtn.textContent = 'Katılıyor...';

            try {
                const roomRef = db.collection('rooms').doc(code);
                const snap = await roomRef.get();
                if (!snap.exists) {
                    showError('Bu kodla eşleşen oda yok');
                    joinBtn.disabled = false;
                    joinBtn.textContent = 'Odaya Katıl';
                    return;
                }

                // Oda varsa içeri aktar
                window.location.href = `room.html?room=${code}&name=${encodeURIComponent(name)}`;
            } catch (err) {
                showError('Hata: ' + err.message);
                joinBtn.disabled = false;
                joinBtn.textContent = 'Odaya Katıl';
            }
        });
    </script>
</body>
</html>
